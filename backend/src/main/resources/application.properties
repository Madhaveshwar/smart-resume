# Server Port
server.port=8080

# Database configuration (local default: file-based H2)
spring.datasource.url=jdbc:h2:file:./data/smart_resume_db;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Optional H2 console for local debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multi-part file upload configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.location=/tmp