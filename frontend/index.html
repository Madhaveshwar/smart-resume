<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart ATS — Resume Filtering System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css"/>

</head>

<body class="bg-gray-950 min-h-screen text-white font-sans">

<!-- HEADER -->
<header class="border-b border-gray-800 px-8 py-4 flex items-center justify-between sticky top-0 z-10 bg-gray-950/95 backdrop-blur">
  <div class="flex items-center gap-3">
    <span class="text-xl font-bold">Smart<span class="text-blue-400">ATS</span></span>
  </div>
</header>

<!-- HERO -->
<section id="heroSection" class="max-w-5xl mx-auto px-6 pt-12 pb-8 text-center">
  <h1 class="text-4xl font-extrabold mb-3">Smart Resume Filtering System</h1>
</section>

<!-- UPLOAD FORM -->
<section id="uploadSection" class="max-w-5xl mx-auto px-6 mb-10">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8">

    <!-- JOB TITLE -->
    <select id="jobTitleSelect" class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 mb-4">
      <option value="">-- Select or leave blank --</option>
    </select>

    <!-- FILE INPUT (FIXED) -->
    <input 
      type="file" 
      id="fileInput" 
      class="w-full mb-4 bg-gray-800 p-3 rounded"
    />

    <!-- DESCRIPTION -->
    <textarea 
      id="jobDescInput"
      placeholder="Job description..."
      class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 mb-4"
    ></textarea>

    <!-- BUTTON -->
    <button id="submitBtn" class="w-full bg-blue-600 py-3 rounded-xl">
      Analyse Resumes
    </button>

  </div>
</section>

<!-- RESULTS -->
<section id="resultsHeader" class="hidden text-center">
  <h2 class="text-2xl font-bold">
    Results <span id="resultJobTitle"></span>
  </h2>
  <p id="resultSubtitle"></p>
</section>

<div id="resumeCards" class="max-w-5xl mx-auto mt-6"></div>

<!-- ✅ SCRIPTS -->
<script src="assets/js/config.js" defer></script>
<script src="assets/js/upload.js" defer></script>

</body>
</html>
